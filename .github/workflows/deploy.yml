name: Deploy Staging

on:
  push:
    branches: [staging]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: voiceforge-ai
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: voiceforge-ai/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: voiceforge-ai
          file: voiceforge-ai/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
      - uses: docker/build-push-action@v6
        with:
          context: voiceforge-ai
          file: voiceforge-ai/docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - run: echo "Deploying sha-$GITHUB_SHA to staging..."
        env:
          GITHUB_SHA: ${{ github.sha }}
